name: Build & Push Frontend Image

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/trainer-frontend:${{ github.ref_name }} .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/trainer-frontend:${{ github.ref_name }}